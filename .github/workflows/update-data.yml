name: update-data

# Daily refresh of all pipelines + manual trigger
on:
  schedule:
    # 10:00 BRT (13:00 UTC) daily
    - cron: '0 13 * * *'
  workflow_dispatch:

# Only allow one instance of this workflow at a time per branch.
# If a new run starts, cancel any in-progress run on the same branch.
# Prevents race conditions on `git push` when two runs overlap.
concurrency:
  group: update-data-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ONS EAR/ENA pipeline (2010+)
        run: python pipelines/ons_ear_ena.py

      - name: Run ONS ENA bacia pipeline (2010+)
        run: python pipelines/ons_ena_bacia.py

      - name: Run NASA POWER basin precipitation pipeline
        run: python pipelines/nasa_power_basin_precip.py

      - name: Run NOAA ONI pipeline
        run: python pipelines/noaa_oni.py

      - name: Run ANEEL bandeira pipeline
        run: python pipelines/aneel_bandeira.py

      - name: Run ANEEL tarifas pipeline (may take 5-10 min)
        run: python pipelines/aneel_tarifas.py

      - name: Run ANEEL MMGD pipeline (large, may take 8-15 min)
        run: python pipelines/aneel_mmgd.py

      - name: Commit and push data updates
        run: |
          git config user.name "dashsin-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            # Pull latest first to avoid push rejection if another commit landed
            git pull --rebase origin main || echo "Rebase had nothing to do"
            git commit -m "data: refresh $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi
