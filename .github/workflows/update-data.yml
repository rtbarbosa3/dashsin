name: update-data

# Roda 1x/dia às 13h UTC = 10h BRT
# Também pode ser disparado manualmente em Actions > update-data > Run workflow
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ONS EAR/ENA pipeline
        run: python pipelines/ons_ear_ena.py
        continue-on-error: true

      - name: Run ONS ENA bruta por bacia pipeline
        run: python pipelines/ons_ena_bacia.py
        continue-on-error: true

      - name: Run NASA POWER precipitation by basin pipeline
        run: python pipelines/nasa_power_basin_precip.py
        continue-on-error: true

      - name: Run NOAA CPC ONI pipeline
        run: python pipelines/noaa_oni.py
        continue-on-error: true

      - name: Run ANEEL Bandeira Tarifaria pipeline
        run: python pipelines/aneel_bandeira.py
        continue-on-error: true

      - name: Run ANEEL Tarifas Homologadas pipeline
        run: python pipelines/aneel_tarifas.py
        continue-on-error: true
        timeout-minutes: 20

      - name: Run ANEEL MMGD pipeline (large, may take a while)
        run: python pipelines/aneel_mmgd.py
        continue-on-error: true
        timeout-minutes: 30

      - name: Commit and push data updates
        run: |
          git config user.name "dashsin-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi
